name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify scripts compile
        run: |
          python3 -m py_compile rebuild-vault-index.py
          python3 -m py_compile orp_reader.py
          python3 -m py_compile orp_health.py
          python3 -m py_compile orp_link_check.py

      - name: Test --help
        run: |
          python3 rebuild-vault-index.py --help
          python3 orp_reader.py --help
          python3 orp_health.py --help
          python3 orp_link_check.py --help

      - name: Build index from example fixture
        run: |
          python3 rebuild-vault-index.py \
            --vault examples \
            --output /tmp/test-index.json \
            --scan notes:cc

      - name: Validate JSON output (schema v1.1)
        run: |
          python3 -c "
          import json
          with open('/tmp/test-index.json') as f:
              data = json.load(f)
          assert 'version' in data, 'Missing version'
          assert 'entries' in data, 'Missing entries'
          assert 'updated' in data, 'Missing updated timestamp'
          assert isinstance(data['entries'], dict), 'entries must be a dict'
          assert len(data['entries']) == 3, f'expected 3 entries from example fixture, got {len(data[\"entries\"])}'
          for eid, e in data['entries'].items():
              assert '_content_hash' in e, f'{eid} missing _content_hash'
              assert 'path' in e, f'{eid} missing path'
              assert 'aliases' in e, f'{eid} missing aliases'
          print(f'OK {len(data[\"entries\"])} entries, valid v{data[\"version\"]} schema')
          "

      - name: Incremental rebuild reports 0 changed
        run: |
          OUT=$(python3 rebuild-vault-index.py \
            --vault examples \
            --output /tmp/test-index.json \
            --scan notes:cc 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "0 changed" || (echo "FAIL: expected '0 changed' on no-op rebuild" && exit 1)

      - name: Corrupted index is preserved as .broken
        run: |
          echo "not json{{{" > /tmp/test-index.json
          python3 rebuild-vault-index.py \
            --vault examples \
            --output /tmp/test-index.json \
            --scan notes:cc 2>&1 | tee /tmp/run.log
          grep -q "Moved to .* to preserve" /tmp/run.log || (echo "FAIL: expected broken-rename warning" && exit 1)
          ls /tmp/test-index.json.broken-* > /dev/null || (echo "FAIL: .broken file not created" && exit 1)
          python3 -c "import json; json.load(open('/tmp/test-index.json'))"

      - name: Cross-scan-dir collisions are disambiguated
        run: |
          mkdir -p /tmp/collide-vault/career /tmp/collide-vault/projects
          printf -- '---\ntitle: A\n---\nbody\n' > /tmp/collide-vault/career/coinbase.md
          printf -- '---\ntitle: B\n---\nbody\n' > /tmp/collide-vault/projects/coinbase.md
          python3 rebuild-vault-index.py \
            --vault /tmp/collide-vault \
            --output /tmp/collide-index.json \
            --scan career:cc projects:cc 2>&1 | tee /tmp/collide.log
          grep -q "collides across scan dirs" /tmp/collide.log || (echo "FAIL: expected collision warning" && exit 1)
          python3 -c "
          import json
          d = json.load(open('/tmp/collide-index.json'))
          ids = set(d['entries'].keys())
          assert ids == {'career-coinbase', 'projects-coinbase'}, f'unexpected ids: {ids}'
          print('OK: collisions disambiguated')
          "

      - name: Frontmatter parser handles all three YAML list forms
        run: |
          mkdir -p /tmp/yaml-vault/notes
          # Form A: inline list on one line
          cat > /tmp/yaml-vault/notes/inline-form.md <<'EOF'
          ---
          title: Inline Form
          aliases: [first-inline, second-inline, third-inline]
          ---
          body
          EOF
          # Form B: list starts on key line with `- val`
          cat > /tmp/yaml-vault/notes/sameline-form.md <<'EOF'
          ---
          title: Sameline Form
          aliases: - first-sameline
            - second-sameline
            - third-sameline
          ---
          body
          EOF
          # Form C: bare key on one line, list on subsequent indented lines
          # This is the standard YAML multi-line form that was silently dropped
          # before this fix.
          cat > /tmp/yaml-vault/notes/standard-form.md <<'EOF'
          ---
          title: Standard Form
          aliases:
            - first-standard
            - second-standard
            - third-standard
          ---
          body
          EOF
          python3 rebuild-vault-index.py \
            --vault /tmp/yaml-vault \
            --output /tmp/yaml-index.json \
            --scan notes:cc
          python3 -c "
          import json
          d = json.load(open('/tmp/yaml-index.json'))
          for eid, expect in [('inline-form', 'first-inline'),
                              ('sameline-form', 'first-sameline'),
                              ('standard-form', 'first-standard')]:
              aliases = d['entries'][eid]['aliases']
              assert expect in aliases, f'{eid} missing {expect}, got {aliases}'
          print('OK: all three YAML list forms parsed')
          "

      - name: rag_exclude frontmatter is honored
        run: |
          mkdir -p /tmp/exclude-vault/notes
          printf -- '---\ntitle: Keep\n---\nbody\n' > /tmp/exclude-vault/notes/keep.md
          printf -- '---\ntitle: Skip\nrag_exclude: true\n---\nbody\n' > /tmp/exclude-vault/notes/skip.md
          python3 rebuild-vault-index.py \
            --vault /tmp/exclude-vault \
            --output /tmp/exclude-index.json \
            --scan notes:cc
          python3 -c "
          import json
          d = json.load(open('/tmp/exclude-index.json'))
          ids = set(d['entries'].keys())
          assert ids == {'keep'}, f'rag_exclude not honored: {ids}'
          print('OK: rag_exclude works')
          "

      - name: Reader — fresh index for reader tests
        run: |
          rm -f /tmp/reader-index.json
          python3 rebuild-vault-index.py \
            --vault examples \
            --output /tmp/reader-index.json \
            --scan notes:cc

      - name: Reader — status reports entry count and freshness
        run: |
          OUT=$(python3 orp_reader.py --index /tmp/reader-index.json status)
          echo "$OUT"
          echo "$OUT" | grep -qE "^[0-9]+ entries.*fresh" || (echo "FAIL: status output unexpected" && exit 1)

      - name: Reader — match returns expected entry
        run: |
          OUT=$(python3 orp_reader.py --index /tmp/reader-index.json match "coinbase japan")
          echo "$OUT"
          echo "$OUT" | grep -q "coinbase-japan-analysis" || (echo "FAIL: expected coinbase match" && exit 1)

      - name: Reader — CJK token matches
        run: |
          OUT=$(python3 orp_reader.py --index /tmp/reader-index.json match "撤退")
          echo "$OUT"
          echo "$OUT" | grep -q "coinbase-japan-analysis" || (echo "FAIL: CJK token did not match" && exit 1)

      - name: Reader — distinct queries hit distinct entries
        run: |
          # Each example note should be reachable via at least one distinct alias
          for query_expected in \
            "stablecoin:japan-stablecoin-regulation" \
            "meowtype:meowtype-status" \
            "撤退:coinbase-japan-analysis"; do
            QUERY="${query_expected%%:*}"
            EXPECTED="${query_expected##*:}"
            OUT=$(python3 orp_reader.py --index /tmp/reader-index.json match "$QUERY")
            echo "query='$QUERY' -> $OUT"
            echo "$OUT" | grep -q "$EXPECTED" || (echo "FAIL: '$QUERY' did not match '$EXPECTED'" && exit 1)
          done

      - name: Reader — no match returns exit 1
        run: |
          set +e
          python3 orp_reader.py --index /tmp/reader-index.json match "totally unrelated zzz"
          RC=$?
          set -e
          test "$RC" = "1" || (echo "FAIL: expected exit 1 on no match, got $RC" && exit 1)

      - name: Reader — missing index returns exit 2
        run: |
          set +e
          python3 orp_reader.py --index /tmp/does-not-exist.json status
          RC=$?
          set -e
          test "$RC" = "2" || (echo "FAIL: expected exit 2 on missing index, got $RC" && exit 1)

      - name: Reader — corrupted index returns exit 3
        run: |
          echo "garbage{{{" > /tmp/bad.json
          set +e
          python3 orp_reader.py --index /tmp/bad.json status
          RC=$?
          set -e
          test "$RC" = "3" || (echo "FAIL: expected exit 3 on corrupted index, got $RC" && exit 1)

      - name: Health — fresh index passes
        run: |
          python3 orp_health.py --index /tmp/reader-index.json

      - name: Health — stale index fails
        run: |
          python3 -c "
          import json
          from datetime import datetime, timezone, timedelta
          d = json.load(open('/tmp/reader-index.json'))
          d['updated'] = (datetime.now(timezone.utc) - timedelta(days=30)).strftime('%Y-%m-%dT%H:%M:%S%z')
          json.dump(d, open('/tmp/stale-index.json', 'w'), ensure_ascii=False, indent=2)
          "
          set +e
          python3 orp_health.py --index /tmp/stale-index.json
          RC=$?
          set -e
          test "$RC" = "1" || (echo "FAIL: expected health exit 1 on stale index, got $RC" && exit 1)

      - name: Health — missing required field fails
        run: |
          python3 -c "
          import json
          d = json.load(open('/tmp/reader-index.json'))
          for eid in d['entries']:
              del d['entries'][eid]['_content_hash']
          json.dump(d, open('/tmp/broken-shape.json', 'w'), ensure_ascii=False, indent=2)
          "
          set +e
          python3 orp_health.py --index /tmp/broken-shape.json
          RC=$?
          set -e
          test "$RC" = "1" || (echo "FAIL: expected health exit 1 on missing field, got $RC" && exit 1)

      - name: Health — orphan path warns but does not fail
        run: |
          python3 -c "
          import json
          d = json.load(open('/tmp/reader-index.json'))
          for eid in d['entries']:
              d['entries'][eid]['path'] = '/tmp/this/does/not/exist.md'
          json.dump(d, open('/tmp/orphan-index.json', 'w'), ensure_ascii=False, indent=2)
          "
          OUT=$(python3 orp_health.py --index /tmp/orphan-index.json 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "WARN:.*paths that no longer exist" || (echo "FAIL: expected orphan warning" && exit 1)

      - name: Health — strict mode escalates warnings to exit 2
        run: |
          set +e
          python3 orp_health.py --index /tmp/orphan-index.json --strict
          RC=$?
          set -e
          test "$RC" = "2" || (echo "FAIL: expected --strict exit 2 on orphans, got $RC" && exit 1)

      - name: Link check — clean vault passes
        run: |
          mkdir -p /tmp/link-vault/wiki
          printf 'see [[wiki/target]] for context\n' > /tmp/link-vault/wiki/source.md
          printf 'target content\n' > /tmp/link-vault/wiki/target.md
          python3 orp_link_check.py --vault /tmp/link-vault --ignore-orphans

      - name: Link check — dead links fail with exit 1
        run: |
          mkdir -p /tmp/dead-vault/wiki
          printf 'see [[wiki/missing]] for details\n' > /tmp/dead-vault/wiki/source.md
          set +e
          OUT=$(python3 orp_link_check.py --vault /tmp/dead-vault --ignore-orphans 2>&1)
          RC=$?
          set -e
          echo "$OUT"
          test "$RC" = "1" || (echo "FAIL: expected link-check exit 1 on dead link, got $RC" && exit 1)
          echo "$OUT" | grep -q "Dead links: 1" || (echo "FAIL: dead link not reported" && exit 1)

      - name: Link check — template variables and dirs are not flagged
        run: |
          mkdir -p /tmp/tpl-vault/wiki/projects
          printf 'see [[wiki/projects/{date}]] and [[wiki/projects/]] for refs\n' > /tmp/tpl-vault/wiki/start.md
          python3 orp_link_check.py --vault /tmp/tpl-vault --ignore-orphans

      - name: Link check — JSON output is parseable
        run: |
          OUT=$(python3 orp_link_check.py --vault /tmp/link-vault --ignore-orphans --json)
          echo "$OUT" | python3 -c "import json, sys; d=json.load(sys.stdin); assert 'dead' in d and 'live' in d; print('OK json shape')"

      - name: Link check — bare wikilinks resolve via vault-wide name lookup
        run: |
          # Obsidian's [[meowtype]] looks up meowtype.md anywhere in the vault.
          # This was previously misclassified as a dead link because resolve()
          # treated the wikilink as a vault-relative path.
          mkdir -p /tmp/bare-vault/wiki/projects /tmp/bare-vault/notes
          printf 'see [[meowtype]] for status\n' > /tmp/bare-vault/notes/source.md
          printf 'project content\n' > /tmp/bare-vault/wiki/projects/meowtype.md
          OUT=$(python3 orp_link_check.py --vault /tmp/bare-vault --ignore-orphans 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "Live links: 1" || (echo "FAIL: bare wikilink not resolved via name index" && exit 1)
          echo "$OUT" | grep -q "Dead links: 0" || (echo "FAIL: bare wikilink reported as dead" && exit 1)

      - name: Link check — bare wikilink with no match is still dead
        run: |
          mkdir -p /tmp/bare-dead-vault/notes
          printf 'see [[totally-missing]] please\n' > /tmp/bare-dead-vault/notes/source.md
          set +e
          OUT=$(python3 orp_link_check.py --vault /tmp/bare-dead-vault --ignore-orphans 2>&1)
          RC=$?
          set -e
          test "$RC" = "1" || (echo "FAIL: expected exit 1 on dead bare wikilink, got $RC" && exit 1)
          echo "$OUT" | grep -q "Dead links: 1" || (echo "FAIL: dead bare wikilink not reported" && exit 1)

      - name: Check file encoding
        run: |
          for f in rebuild-vault-index.py orp_reader.py orp_health.py orp_link_check.py; do
            python3 -c "open('$f', encoding='utf-8').read()" || (echo "Bad encoding in $f" && exit 1)
          done
